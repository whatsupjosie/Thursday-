name: Avatar Motion Spine CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - avatar-motion-spine-upload-integration

jobs:
  avatar-motion-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Compile Python modules and tests
        run: python -m compileall modules tests

      - name: Run Python tests
        run: python -m pytest tests -v

      - name: Check JavaScript syntax
        run: |
          node --check static/pubcast_animation_presets.js
          node --check static/avatar_motion_bridge_consumer.js

      - name: Run Node bridge consumer smoke test
        run: node tests/test_avatar_motion_bridge_consumer_node.mjs
